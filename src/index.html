<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024, user-scalable=no" />
    <title>acsl-clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
    <script type="module" src="./main.js"></script>
  </head>
  <body class="font-rajdhani min-w-5xl">
    <section data-hero class="relative h-screen w-full overflow-hidden">
      <canvas data-hero-webgl class="absolute h-full w-full"></canvas>
      <h1
        data-hero-title
        class="absolute top-1/3 left-1/6 cursor-pointer text-[max(6vw,4rem)] leading-none font-semibold text-white"
      >
        LIBERATE<br />
        HUMANITY<br />
        THROUGH<br />
        TECHNOLOGY
      </h1>
      <div data-hero-pagination class="absolute top-1/2 right-1/25 grid -translate-1/2 gap-[3vh]">
        <template id="hero-dot-template">
          <div data-hero-circle class="group aspect-square w-20 cursor-pointer">
            <svg viewBox="0 0 82 82" class="circle">
              <circle
                data-hero-circle-bg
                class="invisible origin-center -rotate-90"
                cx="41"
                cy="41"
                r="40"
                fill="transparent"
                stroke="rgba(255, 255, 255, 0.3)"
                stroke-width="2"
              ></circle>
              <circle
                data-hero-circle-fg
                class="invisible origin-center -rotate-90"
                cx="41"
                cy="41"
                r="40"
                fill="transparent"
                stroke="#fff"
                stroke-width="2"
              ></circle>
              <circle
                class="origin-center duration-500 group-hover:scale-140"
                cx="41"
                cy="41"
                r="3.5"
                fill="#fff"
              ></circle>
            </svg>
          </div>
        </template>
      </div>
    </section>

    <section data-hover class="py-40">
      <div class="container-main">
        <div data-hover-container class="relative isolate perspective-midrange">
          <h2 class="headline mb-25">OUR SOLUTIONS</h2>
          <ul data-hover-list class="relative flex justify-center gap-[8%] px-15">
            <template id="hover-item-template">
              <li data-hover-item class="w-50 odd:mt-15">
                <div data-hover-item-nav>
                  <a
                    data-hover-item-anchor
                    class="grid aspect-square overflow-hidden rounded-full bg-white [&>*]:[grid-area:1/1]"
                    href="#"
                  >
                    <img class="h-full w-full object-cover" data-hover-item-img src="" alt="" />
                    <svg viewBox="0 0 202 202">
                      <circle cx="101" cy="101" r="100" fill="transparent" stroke="#0af0f2" stroke-width="2"></circle>
                      <circle
                        data-hover-circle-fg
                        class="origin-center -rotate-90"
                        cx="101"
                        cy="101"
                        r="100"
                        fill="transparent"
                        stroke="#3455fc"
                        stroke-width="2"
                      ></circle>
                    </svg>
                  </a>
                  <h3 data-hover-item-title class="mt-6 text-center font-semibold"></h3>
                </div>
                <div
                  data-hover-item-cnt
                  class="absolute right-0 bottom-11/10 grid w-100 grid-cols-[2.5rem_1.5rem_1fr] items-center"
                >
                  <div data-hover-item-index class="text-primary text-xl font-semibold"></div>
                  <div data-hover-item-bar class="bg-primary h-full w-px"></div>
                  <p data-hover-item-text></p>
                </div>
              </li>
            </template>
          </ul>
          <a data-button href="#" class="mx-15 mt-15 inline-block">OUR SOLUTIONS</a>
          <div data-hover-bg class="absolute -inset-x-1/20 -inset-y-1/10 -z-1 grid opacity-10 [&>*]:[grid-area:1/1]">
            <template id="hover-bg-img-template">
              <img data-hover-bg-img src="" alt="" class="hover-bg-mask h-full w-full object-center" />
            </template>
          </div>
        </div>
      </div>
    </section>

    <section data-slider class="relative py-40">
      <div class="bg-primary-light absolute bottom-0 h-1/2 w-screen"></div>
      <div data-slider-container class="container-main">
        <h2 class="headline mb-20">OUR BUSINESS</h2>
        <div class="relative -ms-20 -me-10">
          <div data-slider-nav class="absolute right-0 grid gap-5">
            <template id="slider-nav-item-template">
              <div
                data-slider-nav-item
                class="[&.is-active]:text-primary flex cursor-pointer items-center text-sm font-semibold text-[#c1c4cb] duration-500"
              >
                <div class="mr-5 bg-[#c1c4cb]">
                  <div data-slider-nav-progress class="h-[2em] w-px bg-current"></div>
                </div>
                <div data-slider-nav-index class="w-8"></div>
                <div data-slider-nav-title></div>
              </div>
            </template>
          </div>
          <div data-slider-list class="grid [&>*]:[grid-area:1/1]">
            <template id="slider-item-template">
              <div data-slider-item class="grid grid-cols-[1fr_36rem] items-start">
                <div class="relative -mr-30 h-140">
                  <img data-slider-item-img src="" alt="" class="h-full w-full object-cover" />
                  <div data-slider-item-cover class="absolute inset-0 bg-[image:var(--grad-primary)]"></div>
                </div>
                <div class="z-1 mt-50 bg-white px-24 py-18" data-slider-item-cnt>
                  <div class="mb-10 grid grid-cols-[2.5rem_1fr] items-center gap-5">
                    <div class="bg-primary h-px"></div>
                    <div data-slider-item-index class="text-primary text-sm font-semibold"></div>
                  </div>
                  <div data-slider-item-title class="mb-10 text-4xl font-semibold"></div>
                  <h3 data-slider-item-copy class="mb-7 text-2xl font-semibold"></h3>
                  <p data-slider-item-text></p>
                  <div class="mt-10">
                    <a data-link href="#" class="text-primary text-sm font-semibold">
                      <span data-link-text>READ MORE</span> →
                    </a>
                  </div>
                </div>
              </div>
            </template>
          </div>
          <a data-button href="#" class="absolute top-140 right-144">OUR BUSINESS</a>
        </div>
      </div>
    </section>

    <section data-scroll class="py-40">
      <div class="container-main">
        <div class="relative z-1 ml-[60%]">
          <h2 class="headline">RECRUIT</h2>
          <p class="mt-7">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Rem, doloremque exercitationem quos quasi sed vero
            dicta aliquam dolor dolorem consequuntur.
          </p>
          <a data-button href="#" class="mt-10 block">READ MORE</a>
        </div>
        <div data-scroll-container class="-mt-[3%] py-[8%]">
          <div class="bg-primary-light relative aspect-12/5 translate-x-10">
            <div data-scroll-img class="absolute -top-4/20 left-1/12 aspect-3/2 w-7/20">
              <img
                class="h-full w-full object-cover"
                src="https://cdn.pixabay.com/photo/2020/05/24/11/14/sea-5213746_1280.jpg"
                alt=""
              />
              <div data-scroll-cover class="absolute inset-0 bg-[image:var(--grad-primary)] opacity-85"></div>
            </div>
            <div data-scroll-img class="absolute top-4/20 left-7/20 aspect-3/2 w-11/20">
              <img
                class="h-full w-full object-cover"
                src="https://cdn.pixabay.com/photo/2023/07/12/18/21/croatia-8123037_1280.jpg"
                alt=""
              />
              <div data-scroll-cover class="absolute inset-0 bg-[image:var(--grad-primary)] opacity-85"></div>
            </div>
            <div data-scroll-img class="absolute -bottom-5/20 -left-1/15 aspect-3/2 w-7/20">
              <img
                class="h-full w-full object-cover"
                src="https://cdn.pixabay.com/photo/2021/12/29/14/47/water-6901805_1280.jpg"
                alt=""
              />
              <div data-scroll-cover class="absolute inset-0 bg-[image:var(--grad-primary)] opacity-85"></div>
            </div>
            <div class="absolute top-1/2 -ml-18 flex -translate-y-1/2 items-center gap-4">
              <div class="bg-primary h-px w-36"></div>
              <div class="text-primary text-sm">JOIN OUR TEAM</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <template id="button-body-template">
      <div data-button-body class="bg-primary relative isolate h-20 w-75 overflow-hidden">
        <div data-button-bg class="absolute inset-0 -z-1 -translate-x-full bg-white"></div>
        <div
          class="border-primary grid h-full grid-cols-[1em_1fr_1em] place-items-center border px-8 text-sm leading-none text-white"
        >
          <span></span>
          <span data-button-text></span>
          <span data-button-arrow>→</span>
        </div>
      </div>
    </template>

    <div class="grid grid-cols-[1fr_auto_1fr] items-center gap-20">
      <div class="h-px bg-black"></div>
      <div>END</div>
      <div class="h-px bg-black"></div>
    </div>

    <div class="h-screen"></div>
  </body>
</html>
